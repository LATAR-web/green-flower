# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgb(A9717B)

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 15
    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.2
    }
}

animations {
    bezier = elegant, 0.4, 0.0, 0.2, 1.0
    animation = workspaces, 1, 3, elegant, fade
}
